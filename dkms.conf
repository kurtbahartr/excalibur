# dkms.conf — DKMS configuration for excalibur-wmi
# Placed at /usr/src/excalibur-wmi-<VERSION>/dkms.conf by the installer.
#
# DKMS automatically rebuilds the module against each new kernel on upgrade.
# Install DKMS support with:
#   sudo ./install.sh dkms-install
#
# Manual DKMS operations:
#   sudo dkms add -m excalibur-wmi -v 1.0.0
#   sudo dkms build -m excalibur-wmi -v 1.0.0
#   sudo dkms install -m excalibur-wmi -v 1.0.0
#   sudo dkms remove excalibur-wmi/1.0.0 --all

PACKAGE_NAME="excalibur-wmi"
PACKAGE_VERSION="1.0.0"

# --------------------------------------------------------------------------
# Build configuration
# --------------------------------------------------------------------------
# DKMS sets kernel_source_dir to the headers directory for the target kernel.
# We honour CC/LLVM flags only when the target kernel was built with clang;
# dkms passes the kernel's own compiler choice through kernel_source_dir's
# scripts/Makefile.  The Makefile in this tree already handles both cases
# via the KDIR variable.

MAKE[0]="make KDIR=${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build"
CLEAN="make KDIR=${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

# --------------------------------------------------------------------------
# Module metadata
# --------------------------------------------------------------------------
BUILT_MODULE_NAME[0]="excalibur"
BUILT_MODULE_LOCATION[0]="."

# Install into the updates/dkms tree so dkms-built modules shadow in-tree ones.
DEST_MODULE_LOCATION[0]="/updates/dkms"

# Do not strip debug symbols — useful for out-of-tree driver development.
STRIP[0]="no"

# Automatically rebuild and reinstall when a new kernel is installed.
AUTOINSTALL="yes"
